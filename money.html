<style>

    --ink:#1a2b1f;--paper:#fbf7ec;--card:#ffffff;--gold:#e6a817;--gold-deep:#c8870a;
    --leaf:#3f8a4f;--leaf-soft:#e4f0e6;--rust:#c44a3a;--rust-soft:#f7e3e0;--muted:#7d8a7f;--line:#e7e0cf;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Trebuchet MS','PingFang SC','Microsoft YaHei','Segoe UI',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding:0 0 40px;}
  .wrap{max-width:480px;margin:0 auto;padding:0 18px;}
  .langbar{display:flex;gap:6px;justify-content:center;padding:16px 0 0;}
  .langbar button{border:2px solid var(--ink);background:var(--card);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;color:var(--ink);}
  .langbar button.on{background:var(--ink);color:var(--paper);}
  header{text-align:center;padding:14px 0 10px;}
  .eyebrow{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--leaf);font-weight:bold;}
  .kidname{font-size:15px;color:var(--muted);margin-top:2px;}
  .kidname span{border-bottom:1px dashed var(--line);cursor:pointer;}
  .jar{background:var(--card);border:3px solid var(--ink);border-radius:22px;padding:22px 20px 24px;margin-top:16px;box-shadow:6px 6px 0 var(--ink);position:relative;}
  .jar-label{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
  .balance{font-size:62px;font-weight:bold;line-height:1;margin:6px 0 2px;letter-spacing:-2px;}
  .balance .cur{font-size:30px;vertical-align:top;color:var(--gold-deep);}
  .week-note{font-size:13px;color:var(--muted);}
  .week-note b{color:var(--leaf);}
  .breakdown{display:flex;justify-content:center;gap:18px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-size:13px;}
  .breakdown div{text-align:center;}
  .breakdown .num{font-size:19px;font-weight:bold;display:block;}
  .b-base .num{color:var(--ink);}.b-bonus .num{color:var(--leaf);}.b-ded .num{color:var(--rust);}
  .sec-title{display:flex;align-items:center;gap:10px;margin:26px 0 12px;}
  .sec-title h2{font-size:16px;letter-spacing:0.5px;}
  .sec-title .rule{flex:1;height:2px;background:var(--line);}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .act{border:2px solid var(--ink);border-radius:14px;background:var(--card);padding:13px 12px;text-align:left;cursor:pointer;transition:transform .08s ease, box-shadow .08s ease;box-shadow:3px 3px 0 var(--ink);}
  .act:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}
  .act .lbl{font-size:14px;font-weight:bold;display:block;line-height:1.25;}
  .act .lbl small{font-weight:normal;color:var(--muted);font-size:11px;display:block;}
  .act .amt{font-size:13px;font-weight:bold;margin-top:5px;display:inline-block;}
  .act.bonus{background:var(--leaf-soft);}.act.bonus .amt{color:var(--leaf);}
  .act.deduct{background:var(--rust-soft);}.act.deduct .amt{color:var(--rust);}
  .custom-row{grid-column:1 / -1;display:flex;gap:8px;align-items:stretch;margin-top:2px;}
  .custom-row input[type=text]{flex:1;border:2px solid var(--ink);border-radius:12px;padding:11px 12px;font-size:14px;font-family:inherit;background:var(--card);min-width:0;}
  .custom-row input[type=number]{width:74px;border:2px solid var(--ink);border-radius:12px;padding:11px 8px;font-size:14px;font-family:inherit;text-align:center;background:var(--card);}
  .custom-row .pm{display:flex;flex-direction:column;border:2px solid var(--ink);border-radius:12px;overflow:hidden;}
  .custom-row .pm button{border:none;background:var(--card);font-weight:bold;width:34px;flex:1;cursor:pointer;font-size:16px;}
  .custom-row .pm button.on{background:var(--ink);color:var(--paper);}
  .custom-add{border:2px solid var(--ink);border-radius:12px;background:var(--gold);font-weight:bold;padding:0 16px;cursor:pointer;font-size:14px;box-shadow:3px 3px 0 var(--ink);white-space:nowrap;}
  .custom-add:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}
  .ledger{list-style:none;}
  .ledger li{background:var(--card);border:2px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
  .ledger .icon{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px;}
  .ledger .icon.up{background:var(--leaf-soft);color:var(--leaf);}
  .ledger .icon.down{background:var(--rust-soft);color:var(--rust);}
  .ledger .icon.base{background:#f2ecd9;color:var(--gold-deep);}
  .ledger .info{flex:1;min-width:0;}
  .ledger .info .reason{font-size:14px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ledger .info .when{font-size:11px;color:var(--muted);}
  .ledger .delta{font-weight:bold;font-size:15px;white-space:nowrap;}
  .ledger .delta.up{color:var(--leaf);}.ledger .delta.down{color:var(--rust);}
  .ledger .del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 4px;line-height:1;}
  .weekgroup{margin-bottom:10px;}
  .wk-head{width:100%;display:flex;align-items:center;gap:10px;background:var(--card);border:2px solid var(--ink);border-radius:12px;padding:11px 13px;cursor:pointer;font-family:inherit;text-align:left;box-shadow:3px 3px 0 var(--ink);}

  .wk-caret{font-size:13px;color:var(--muted);transition:transform .18s ease;flex-shrink:0;}
  .weekgroup.open .wk-caret{transform:rotate(90deg);}
  .wk-title{flex:1;font-size:14px;font-weight:bold;color:var(--ink);line-height:1.25;}
  .wk-title small{display:block;font-weight:normal;color:var(--muted);font-size:11px;}
  .wk-paid{font-size:12px;font-weight:bold;color:var(--gold-deep);background:#f2ecd9;border-radius:8px;padding:3px 9px;white-space:nowrap;}
  .wk-current{font-size:12px;font-weight:bold;color:var(--leaf);background:var(--leaf-soft);border-radius:8px;padding:3px 9px;white-space:nowrap;}
  .wk-body{display:none;padding-top:8px;}
  .weekgroup.open .wk-body{display:block;}
  .wk-empty{text-align:center;color:var(--muted);font-size:13px;padding:14px 0;}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:24px 0;}
  /* week strip */
  .weekcard{background:var(--card);border:2px solid var(--ink);border-radius:18px;padding:14px 14px 16px;margin-top:16px;box-shadow:4px 4px 0 var(--ink);}
  .weekhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .weekhead .month{font-size:15px;font-weight:bold;}
  .weekhead .wk{font-size:12px;color:var(--muted);letter-spacing:0.5px;}
  .weekgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .day{border:1.5px solid var(--line);border-radius:10px;padding:6px 2px 7px;text-align:center;min-height:58px;display:flex;flex-direction:column;justify-content:space-between;}
  .day .dow{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
  .day .dnum{font-size:15px;font-weight:bold;line-height:1.1;margin-top:1px;}
  .day .dval{font-size:11px;font-weight:bold;margin-top:3px;min-height:14px;}
  .day .dval.up{color:var(--leaf);}.day .dval.down{color:var(--rust);}
  .day.today{border-color:var(--ink);border-width:2.5px;background:#fff;box-shadow:2px 2px 0 var(--ink);}
  .day.today .dow{color:var(--leaf);}
  .day.future{opacity:0.4;}
  .day.haspos{background:var(--leaf-soft);}
  .day.hasneg{background:var(--rust-soft);}
  .day{position:relative;cursor:pointer;}
  .day.future{cursor:default;}
  .day.checked{border-color:var(--leaf);border-width:2px;}
  .day .checkmark{position:absolute;top:2px;right:4px;font-size:11px;font-weight:bold;color:var(--leaf);line-height:1;}
  .day.missed{opacity:0.55;}

  .day.missed .dval.up{color:var(--muted);text-decoration:line-through;}
  .checkin-btn{width:100%;margin-top:12px;border:2px solid var(--ink);border-radius:12px;padding:12px;font-weight:bold;font-size:14px;cursor:pointer;font-family:inherit;background:var(--gold);box-shadow:3px 3px 0 var(--ink);}
  .checkin-btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}
  .checkin-btn.done{background:var(--leaf-soft);color:var(--leaf);border-color:var(--leaf);}
  .pending-note{font-size:12px;color:var(--gold-deep);font-weight:bold;margin-top:6px;background:#f7efd8;border-radius:8px;padding:5px 8px;display:inline-block;}
  .footer-actions{text-align:center;margin-top:18px;}
  .pw-link{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:6px;}
  .savings-note{background:#f2ecd9;border:2px dashed var(--gold-deep);border-radius:14px;padding:13px 15px;margin-top:14px;font-size:13px;line-height:1.55;}
  .savings-note b{color:var(--gold-deep);}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:30px;font-weight:bold;font-size:14px;opacity:0;transition:all .25s ease;pointer-events:none;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.25);}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .loading{text-align:center;padding:60px 0;color:var(--muted);}
  /* lock screen */
  .lockscreen{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;padding:24px;z-index:200;}
  .lockscreen.hide{display:none;}
  .lockbox{background:var(--card);border:3px solid var(--ink);border-radius:22px;box-shadow:6px 6px 0 var(--ink);padding:30px 26px;width:100%;max-width:320px;text-align:center;}
  .lock-emoji{font-size:46px;line-height:1;}
  .lock-title{font-size:20px;font-weight:bold;margin-top:10px;color:var(--ink);}
  .lock-sub{font-size:13px;color:var(--muted);margin-top:4px;margin-bottom:18px;}
  .lockbox input{width:100%;border:2px solid var(--ink);border-radius:12px;padding:13px 14px;font-size:18px;font-family:inherit;text-align:center;letter-spacing:3px;background:var(--card);}
  .lock-err{color:var(--rust);font-size:13px;font-weight:bold;min-height:18px;margin-top:10px;}
  .lock-btn{width:100%;border:2px solid var(--ink);border-radius:12px;padding:13px;font-weight:bold;font-size:15px;cursor:pointer;font-family:inherit;background:var(--gold);box-shadow:3px 3px 0 var(--ink);margin-top:6px;}
  .lock-btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}
  /* in-page modal */
  .modal-mask{position:fixed;inset:0;background:rgba(26,43,31,.5);display:flex;align-items:center;justify-content:center;padding:24px;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .modal-mask.show{opacity:1;pointer-events:auto;}
  .modal{background:var(--card);border:3px solid var(--ink);border-radius:20px;box-shadow:7px 7px 0 var(--ink);width:100%;max-width:340px;padding:22px 20px 18px;transform:translateY(14px) scale(.97);transition:transform .2s ease;}
  .modal-mask.show .modal{transform:translateY(0) scale(1);}
  .modal .m-title{font-size:17px;font-weight:bold;margin-bottom:8px;}
  .modal .m-body{font-size:14px;line-height:1.55;color:var(--ink);white-space:pre-wrap;margin-bottom:16px;}
  .modal input[type=text]{width:100%;border:2px solid var(--ink);border-radius:12px;padding:11px 12px;font-size:15px;font-family:inherit;background:var(--card);margin-bottom:16px;}
  .modal .m-btns{display:flex;gap:10px;}
  .modal .m-btns button{flex:1;border:2px solid var(--ink);border-radius:12px;padding:12px;font-weight:bold;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:3px 3px 0 var(--ink);background:var(--card);color:var(--ink);}
  .modal .m-btns button:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}
  .modal .m-btns button.primary{background:var(--gold);}
  .modal .m-btns button.danger{background:var(--rust);color:#fff;}
</style>
</head>

// in-page modal: returns a Promise. type: 'alert' | 'confirm' | 'prompt'
function modal(opts){
  return new Promise(resolve=>{
    const mask=document.getElementById('modalMask');const box=document.getElementById('modalBox');
    const type=opts.type||'alert';
    const okTxt=opts.okText||(state.lang==='en'?'OK':'确定');
    const cancelTxt=opts.cancelText||(state.lang==='en'?'Cancel':'取消');
    const hasInput=type==='prompt';
    const hasCancel=type==='confirm'||type==='prompt';
    box.innerHTML=`
      ${opts.title?`<div class="m-title">${opts.title}</div>`:''}
      ${opts.body?`<div class="m-body">${opts.body}</div>`:''}
      ${hasInput?`<input type="text" id="modalInput" value="">`:''}
      <div class="m-btns">
        ${hasCancel?`<button class="cancel">${cancelTxt}</button>`:''}
        <button class="${opts.danger?'danger':'primary'} ok">${okTxt}</button>
      </div>`;
    if(hasInput){const inp=box.querySelector('#modalInput');inp.value=opts.defaultValue||'';}
    mask.classList.add('show');
    if(hasInput){setTimeout(()=>{const inp=box.querySelector('#modalInput');if(inp){inp.focus();inp.select();}},50);}
    const close=(val)=>{mask.classList.remove('show');mask.onclick=null;resolve(val);};
    box.querySelector('.ok').onclick=()=>{
      if(hasInput){close(box.querySelector('#modalInput').value);}
      else{close(true);}
    };
    const cancelBtn=box.querySelector('.cancel');
    if(cancelBtn)cancelBtn.onclick=()=>close(type==='prompt'?null:false);
    mask.onclick=(e)=>{if(e.target===mask)close(type==='prompt'?null:(type==='confirm'?false:true));};
    if(hasInput){const inp=box.querySelector('#modalInput');inp.onkeydown=(e)=>{if(e.key==='Enter')close(inp.value);};}
  });
}

function defaultName(){return state.lang==='zh'?"我的孩子":"my son";}
function catLabel(it){if(state.lang==='en')return `<span class="lbl">${it.en}</span>`;if(state.lang==='zh')return `<span class="lbl">${it.zh}</span>`;return `<span class="lbl">${it.en}<small>${it.zh}</small></span>`;}
function reasonText(en){const all=[...BONUSES,...DEDUCTIONS];if(en.kind==='cat'){const it=all.find(x=>x.id===en.refId);if(it){if(state.lang==='en')return it.en;if(state.lang==='zh')return it.zh;return it.en+' · '+it.zh;}}if(en.kind==='base')return en.payout!=null?L().weekEnded(en.payout):'';return en.reason;}
// 记录倒序（最新在前）。base 记录的 payout = 它结算的那一周（时间上更早、即数组中其后的记录）的发放额。
// 第 0 组是当前进行中的本周（最新、尚无 base 结算）。
function groupByWeek(){
  const groups=[];let cur={items:[],payout:null,paidAt:null};
  for(const en of state.entries){
    if(en.kind==='base'){
      // 当前累积的这组到此结束（它是更晚的一周），下一条 base 才是它的结算点……
      // 但更晚的一周此时尚未被结算，所以它的 payout 留空；
      // 而这条 base 的 payout 属于"接下来要累积的更早那一周"。
      groups.push(cur);
      cur={items:[],payout:en.payout,paidAt:en.ts};
    }else{
      cur.items.push(en);
    }
  }
  groups.push(cur);
  groups.forEach(g=>{
    const allTs=g.items.map(i=>i.ts).concat(g.paidAt?[g.paidAt]:[]);
    g.startTs=allTs.length?Math.min(...allTs):null;
    g.endTs=allTs.length?Math.max(...allTs):null;
  });
  // 过滤掉完全空的组（既无记录也无发放）
  return groups.filter(g=>g.items.length||g.payout!=null);
}
let expandedWeeks={};
function toggleWeek(idx){expandedWeeks[idx]=!expandedWeeks[idx];render();}
function weekRangeLabel(g,isCurrent){
  let s,e;
  if(isCurrent){
    // 本周用固定日历周（周一到周日），跟上方日历卡片一致
    s=mondayOf(new Date());e=new Date(s);e.setDate(s.getDate()+6);
  }else{
    if(!g.startTs)return'';
    s=new Date(g.startTs);e=new Date(g.endTs);
  }
  const m=L().months;
  if(state.lang==='zh')return `${m[s.getMonth()]}${s.getDate()}日 – ${m[e.getMonth()]}${e.getDate()}日`;
  return `${m[s.getMonth()]} ${s.getDate()} – ${m[e.getMonth()]} ${e.getDate()}`;
}
let saving=false;
const DEFAULT_PASSWORD="1234"; // 首次使用的默认密码，登录后请尽快修改
function applyDefaults(){if(!state.entries)state.entries=[];if(!state.lang)state.lang='bi';if(!state.name)state.name=defaultName();if(!state.checkins)state.checkins={};if(!state.password)state.password=DEFAULT_PASSWORD;}
// 把时间戳转成本地日期 key（YYYY-MM-DD），用作签到记录的键
function dayKey(d){const x=new Date(d);return x.getFullYear()+'-'+('0'+(x.getMonth()+1)).slice(-2)+'-'+('0'+x.getDate()).slice(-2);}
function isCheckedIn(d){return !!(state.checkins&&state.checkins[dayKey(d)]);}
// 切换某天的签到状态（今日签到 / 补签 / 取消误签）
async function toggleCheckin(ts){
  const k=dayKey(ts);
  const todayS=startOfDay(new Date());
  const isToday=startOfDay(new Date(ts))===todayS;
  const dayLabel=new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
  if(state.checkins[k]){
    // 取消签到：过去日期需确认（会让那天加分失效），今天直接取消
    if(!isToday){const ok=await modal({type:'confirm',body:L().uncheckBody(dayLabel),okText:L().confirm,cancelText:L().cancel2,danger:true});if(!ok)return;}
    delete state.checkins[k];save();render();return;
  }
  // 补签过去的日期需确认
  if(!isToday){const ok=await modal({type:'confirm',title:L().makeupTitle,body:L().makeupBody(dayLabel),okText:L().confirm,cancelText:L().cancel2});if(!ok)return;}
  const before=weekBalance();
  state.checkins[k]=true;
  const after=weekBalance();
  save();render();
  if(isToday)toast(L().checkinDone);
  // 签到后可能跨过封顶线，沿用既有边界提醒
  checkBoundaries(before,after);
}
// 仅拉取云端数据用于登录验证（不渲染、不订阅）。返回当前生效的密码。
// 离线或云端失败时回退到本地缓存，再不行用默认密码。
async function fetchPasswordOnly(){
  if(sb){
    try{
      const {data,error}=await sb.from('pocket_money').select('data').eq('id',ROW_ID).maybeSingle();
      if(!error&&data&&data.data){state=data.data;applyDefaults();return state.password;}
    }catch(e){}
  }
  try{const c=localStorage.getItem('pmtracker:state');if(c){state=JSON.parse(c);applyDefaults();return state.password;}}catch(e){}
  return DEFAULT_PASSWORD;
}
async function load(){
  try{const c=localStorage.getItem('pmtracker:state');if(c){state=JSON.parse(c);applyDefaults();render();}}catch(e){}
  if(!sb){applyDefaults();render();await checkAutoSettle();toast("Offline 离线模式");return;}
  try{
    const {data,error}=await sb.from('pocket_money').select('data').eq('id',ROW_ID).maybeSingle();
    if(error)throw error;
    if(data&&data.data){state=data.data;}
    applyDefaults();
    try{localStorage.setItem('pmtracker:state',JSON.stringify(state));}catch(e){}
    render();
    await checkAutoSettle();
    subscribeRealtime();
  }catch(e){applyDefaults();render();await checkAutoSettle();toast("Cloud offline 云端连接失败");}
}
async function save(){
  applyDefaults();
  try{localStorage.setItem('pmtracker:state',JSON.stringify(state));}catch(e){}
  if(!sb)return;
  try{
    saving=true;
    const {error}=await sb.from('pocket_money').upsert({id:ROW_ID,data:state,updated_at:new Date().toISOString()});
    if(error)throw error;
  }catch(e){toast("Couldn't sync 同步失败");}
  finally{setTimeout(()=>{saving=false;},400);}
}
function subscribeRealtime(){
  if(!sb||subscribeRealtime._done)return;subscribeRealtime._done=true;
  sb.channel('pm').on('postgres_changes',{event:'*',schema:'public',table:'pocket_money',filter:'id=eq.'+ROW_ID},(payload)=>{
    if(saving)return;
    if(payload.new&&payload.new.data){state=payload.new.data;applyDefaults();try{localStorage.setItem('pmtracker:state',JSON.stringify(state));}catch(e){}render();}
  }).subscribe();
}
function lastWeekStart(){for(const en of state.entries){if(en.kind==='base')return en.ts;}return 0;}
// 执行一次结算：记录发放金额、标记本次结算对应的周一、开启新周
function doPayout(payAt){const wb=weekBalance();const pay=Math.max(0,wb.total);const ts=payAt||Date.now();state.entries.unshift({kind:'base',amt:BASE_WEEKLY,payout:pay,ts});state.lastSettledMonday=mondayOf(new Date(ts)).getTime();return pay;}
function weekBalance(){
  const since=lastWeekStart();
  const todayS=startOfDay(new Date());
  let bonusRaw=0,ded=0,pending=0;
  state.entries.forEach(en=>{
    if(en.ts<since||en.kind==='base')return;
    const dayS=startOfDay(new Date(en.ts));
    const checked=isCheckedIn(en.ts);
    if(en.amt>0){
      // 加分：只有当天签到才计入；今天未签到的加分单独归入 pending（待解锁），不进余额
      if(checked)bonusRaw+=en.amt;
      else if(dayS===todayS)pending+=en.amt;
      // 过去某天未签到的加分：作废，既不计入也不算 pending
    }else{
      // 扣分：永远计入，签不签都算
      ded+=Math.abs(en.amt);
    }
  });
  const bonus=Math.min(bonusRaw,BONUS_CAP);
  const capped=bonusRaw>BONUS_CAP;
  const total=Math.max(0,BASE_WEEKLY+bonus-ded);
  return{base:BASE_WEEKLY,bonus,bonusRaw,capped,ded,total,pending};
}
function checkBoundaries(before,after){
  // bonus cap just crossed
  if(after.bonusRaw>BONUS_CAP && before.bonusRaw<=BONUS_CAP){setTimeout(()=>modal({type:'alert',body:L().capAlert}),120);return;}
  // balance just hit zero (was above, now floored at 0)
  if(after.total===0 && before.total>0){setTimeout(()=>modal({type:'alert',body:L().zeroAlert}),120);}
}
function addCat(refId,amt){const before=weekBalance();state.entries.unshift({kind:'cat',refId,amt,ts:Date.now()});const after=weekBalance();save();render();checkBoundaries(before,after);}
function addCustomEntry(reason,amt){const before=weekBalance();state.entries.unshift({kind:'custom',reason,amt,ts:Date.now()});const after=weekBalance();save();render();checkBoundaries(before,after);}
// 周一凌晨进入新一周、上周未结算时自动结算。返回 true 表示发生了结算。
async function checkAutoSettle(){
  const thisMonday=mondayOf(new Date()).getTime();
  // 初次使用、还没有任何 base 记录：以本周一为基准，不补发历史，只登记基准
  if(state.lastSettledMonday==null){
    const lws=lastWeekStart();
    state.lastSettledMonday=lws?mondayOf(new Date(lws)).getTime():thisMonday;
    return false;
  }
  // 已经结算到当前这一周（或更新）：无需处理
  if(state.lastSettledMonday>=thisMonday)return false;
  // 进入了新的一周且上周未结算 → 自动结算一次（只发上一周余额，不补历史空白周）
  const pay=doPayout();
  save();render();
  // 弹通知告知结果
  setTimeout(()=>modal({type:'alert',title:L().autoSettleTitle,body:L().autoSettleBody(pay)}),300);
  return true;
}
function delEntry(ts){state.entries=state.entries.filter(e=>e.ts!==ts);save();render();}
async function editName(){const n=await modal({type:'prompt',title:L().namePrompt,defaultValue:state.name});if(n&&n.trim()){state.name=n.trim();save();render();}}
async function changePassword(){
  const pw1=await modal({type:'prompt',title:L().newPwTitle,body:L().newPwBody,defaultValue:''});
  if(pw1==null)return; // 取消
  if(pw1.length<4){await modal({type:'alert',body:L().pwTooShort});return;}
  const pw2=await modal({type:'prompt',title:L().confirmPwTitle,body:L().confirmPwBody,defaultValue:''});
  if(pw2==null)return;
  if(pw1!==pw2){await modal({type:'alert',body:L().pwMismatch});return;}
  state.password=pw1;save();render();toast(L().pwChanged);
}
function setLang(l){state.lang=l;save();render();}
function timeAgo(ts){const d=new Date(ts);return d.toLocaleDateString(undefined,{weekday:'short'})+' '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function startOfDay(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();}
function mondayOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function isoWeek(d){const t=new Date(d.getFullYear(),d.getMonth(),d.getDate());const day=(t.getDay()+6)%7;t.setDate(t.getDate()-day+3);const first=new Date(t.getFullYear(),0,4);const fday=(first.getDay()+6)%7;first.setDate(first.getDate()-fday+3);return 1+Math.round((t-first)/(7*864e5));}
function dayNet(dayStart){const dayEnd=dayStart+864e5;let net=0;state.entries.forEach(en=>{if(en.kind!=='base'&&en.ts>=dayStart&&en.ts<dayEnd)net+=en.amt;});return net;}
function render(){const wb=weekBalance();const t=L();const app=document.getElementById('app');app.innerHTML=`
  <div class="langbar">
    <button class="${state.lang==='en'?'on':''}" onclick="setLang('en')">EN</button>
    <button class="${state.lang==='bi'?'on':''}" onclick="setLang('bi')">EN/中</button>
    <button class="${state.lang==='zh'?'on':''}" onclick="setLang('zh')">中文</button>
  </div>
  <header>
    <div class="eyebrow">${t.eyebrow}</div>
    <div class="kidname">${t.forName} <span onclick="editName()">${state.name} ✎</span></div>
    <div class="jar">
      <div class="jar-label">${t.balLabel}</div>
      <div class="balance"><span class="cur">${CUR}</span>${Math.max(0,wb.total)}</div>
      <div class="week-note">${t.startsAt} <b>${CUR}${BASE_WEEKLY}</b> ${t.everyWeek}</div>
      ${wb.pending>0?`<div class="pending-note">🔓 ${t.pendingNote(wb.pending)}</div>`:''}
      <div class="breakdown">
        <div class="b-base"><span class="num">${CUR}${wb.base}</span>${t.base}</div>
        <div class="b-bonus"><span class="num">+${wb.bonus}${wb.capped?' ⛳':''}</span>${t.earned}${wb.capped?' ('+t.cappedTag+')':''}</div>
        <div class="b-ded"><span class="num">−${wb.ded}</span>${t.lost}</div>
      </div>
    </div>
    </div>
  </header>
  ${(function(){
    const now=new Date();const mon=mondayOf(now);const todayS=startOfDay(now);
    const wk=isoWeek(now);
    let label;
    if(state.lang==='zh'){label=`${t.months[now.getMonth()]}${now.getDate()}日 · 第${wk}周`;}
    else{label=`${t.months[now.getMonth()]} ${now.getDate()} · ${t.weekOf} ${wk}`;}
    let cells='';
    for(let i=0;i<7;i++){
      const d=new Date(mon);d.setDate(mon.getDate()+i);const ds=startOfDay(d);
      const net=dayNet(ds);
      const isToday=ds===todayS;const isFuture=ds>todayS;
      const checked=isCheckedIn(d);
      // 过去某天有加分但没签到 → 该天加分作废，标记为 missed
      const missedBonus=!isFuture&&!checked&&net>0;
      let cls='day';if(isToday)cls+=' today';if(isFuture)cls+=' future';
      if(checked)cls+=' checked';
      if(missedBonus)cls+=' missed';
      else if(!isFuture&&net>0&&checked)cls+=' haspos';
      if(!isFuture&&net<0)cls+=' hasneg';
      let val='';if(net>0)val=`<span class="dval up">+${net}</span>`;else if(net<0)val=`<span class="dval down">${net}</span>`;else val=`<span class="dval"></span>`;
      const mark=checked?'<span class="checkmark">✓</span>':'';
      // 非未来日期可点击：今天=签到，过去=补签/取消
      const clickable=!isFuture?` onclick="toggleCheckin(${ds})"`:'';
      cells+=`<div class="${cls}"${clickable}><span class="dow">${t.dows[i]}</span><span class="dnum">${d.getDate()}</span>${val}${mark}</div>`;
    }
    const todayChecked=isCheckedIn(now);
    const btn=`<button class="checkin-btn ${todayChecked?'done':''}" onclick="toggleCheckin(${todayS})">${todayChecked?t.checkedIn:t.checkIn}</button>`;
    return `<div class="weekcard"><div class="weekhead"><span class="month">${label}</span></div><div class="weekgrid">${cells}</div>${btn}</div>`;
  })()}
  <div class="sec-title"><h2>${t.earnExtra}</h2><div class="rule"></div></div>
  <div class="actions">${BONUSES.map(b=>`<button class="act bonus" onclick="addCat('${b.id}',${b.amt})">${catLabel(b)}<span class="amt">+${CUR}${b.amt}</span></button>`).join('')}</div>
  <div class="sec-title"><h2>${t.loseMoney}</h2><div class="rule"></div></div>
  <div class="actions">${DEDUCTIONS.map(d=>`<button class="act deduct" onclick="addCat('${d.id}',${-d.amt})">${catLabel(d)}<span class="amt">−${CUR}${d.amt}</span></button>`).join('')}</div>
  <div class="sec-title"><h2>${t.addOwn}</h2><div class="rule"></div></div>
  <div class="actions"><div class="custom-row">
    <input type="text" id="cReason" placeholder="${t.whatHappened}">
    <div class="pm"><button id="signPlus" class="${customSign>0?'on':''}" onclick="setSign(1)">+</button><button id="signMinus" class="${customSign<0?'on':''}" onclick="setSign(-1)">−</button></div>
    <input type="number" id="cAmt" placeholder="${t.amtPh}" min="0" step="1">
    <button class="custom-add" onclick="addCustom()">${t.add}</button>
  </div></div>
  <div class="savings-note">💡 ${t.jars}</div>
  <div class="footer-actions"><button class="pw-link" onclick="changePassword()">🔒 ${t.changePw}</button></div>
  <div class="sec-title"><h2>${t.history}</h2><div class="rule"></div></div>
  ${(function(){
    const groups=groupByWeek();
    if(groups.length===0||groups.every(g=>g.items.length===0))return `<div class="empty">${t.noActivity}</div>`;
    return groups.map((g,idx)=>{
      const isCurrent=idx===0;
      const open=isCurrent?(expandedWeeks[idx]!==false):(expandedWeeks[idx]===true);
      const range=weekRangeLabel(g,isCurrent);
      const paidTag=g.payout!=null?`<span class="wk-paid">${state.lang==='en'?'Paid':'已发'} ${CUR}${g.payout}</span>`:(isCurrent?`<span class="wk-current">${state.lang==='en'?'In progress':'进行中'}</span>`:'');
      const title=isCurrent?(state.lang==='en'?'This week':'本周'):range;
      const sub=isCurrent&&range?range:'';
      const rows=g.items.map(en=>{const cls=en.amt>0?'up':'down';const sign=en.amt>0?'+':'−';const icon=en.amt>0?'↑':'↓';return `<li><div class="icon ${cls}">${icon}</div><div class="info"><div class="reason">${reasonText(en)}</div><div class="when">${timeAgo(en.ts)}</div></div><div class="delta ${cls}">${sign}${CUR}${Math.abs(en.amt)}</div><button class="del" onclick="delEntry(${en.ts})">×</button></li>`;}).join('');
      const body=g.items.length?`<ul class="ledger">${rows}</ul>`:`<div class="wk-empty">${state.lang==='en'?'No activity this week':'本周暂无记录'}</div>`;
      return `<div class="weekgroup ${open?'open':''}">
        <button class="wk-head" onclick="toggleWeek(${idx})">
          <span class="wk-caret">▸</span>
          <span class="wk-title">${title}${sub?`<small>${sub}</small>`:''}</span>
          ${paidTag}
        </button>
        <div class="wk-body">${body}</div>
      </div>`;
    }).join('');
  })()}`;}
function setSign(s){customSign=s;document.getElementById('signPlus').classList.toggle('on',s>0);document.getElementById('signMinus').classList.toggle('on',s<0);}
function addCustom(){const reason=document.getElementById('cReason').value.trim();const amt=parseInt(document.getElementById('cAmt').value,10);if(!reason){toast(L().reasonFirst);return;}if(!amt||amt<=0){toast(L().amtFirst);return;}addCustomEntry(reason,customSign*amt);toast(customSign>0?L().addedToast:L().recordedToast);}
// ===== 登录门槛 =====
// 注意：前端密码只是简单门槛，不是真正的安全措施（密码可被读取）。
// 真正的数据保护依赖 Supabase 的 RLS 策略。
let unlocking=false;
async function unlock(){
  if(unlocking)return;
  const inp=document.getElementById('lockInput');
  const err=document.getElementById('lockErr');
  const btn=document.getElementById('lockBtn');
  const entered=inp.value;
  unlocking=true;btn.textContent="验证中… · Checking…";err.textContent="";
  const realPw=await fetchPasswordOnly();
  unlocking=false;btn.textContent="进入 · Enter";
  if(entered===realPw){
    document.getElementById('lockscreen').classList.add('hide');
    load();
  }else{
    err.textContent="密码不对 · Wrong password";
    inp.value="";inp.focus();
  }
}
document.getElementById('lockBtn').addEventListener('click',unlock);
document.getElementById('lockInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')unlock();});
document.getElementById('lockInput').focus();
</script>
</body>
